{% extends "common/base.html" %}
{% load crispy_forms_tags %}
{% block content %}
  <div class="container mt-4">
    <div class="card">
      <div class="card-header">
        <h2>Grant Cluster Access</h2>
      </div>
      <div class="card-body">
        <form method="post" id="hx_allocation_form">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="mt-4">
            <button type="submit" class="btn btn-primary">Create</button>
          </div>
        </form>
      </div>
    </div>
  </div>
  <script>
    // Enable Select2 for the select elements
    $(document).ready(function() {
    $('.js-example-basic-single').select2();
});

    // Javascript that visually disables (and prevents user interacting with) the
    // hx3 option in the dropdown. This can be deleted when HX3 is available for allocation.
    document.querySelectorAll('[data-disabled-options]').forEach(select => {
        select.getAttribute('data-disabled-options').split(',').forEach(val => {
        select.querySelector(`option[value="${val}"]`).disabled = true;
        });
    });

  </script>
{% endblock content %}
